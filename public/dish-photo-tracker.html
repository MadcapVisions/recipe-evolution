<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dish Families – Stock Photo Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 32px 16px; }
  h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 28px; }
  .progress-bar-wrap { background: #e0e0d8; border-radius: 99px; height: 8px; margin-bottom: 28px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #2d9b4e; border-radius: 99px; transition: width 0.3s ease; }
  .progress-label { font-size: 0.8rem; color: #666; margin-bottom: 8px; }
  .section { margin-bottom: 28px; }
  .section-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #888; padding: 0 0 10px 0; border-bottom: 1px solid #ddd; margin-bottom: 10px; }
  .family-row { display: flex; align-items: flex-start; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; transition: background 0.12s; }
  .family-row:hover { background: #ebebea; }
  .family-row.done { opacity: 0.55; }
  input[type="checkbox"] { margin-top: 2px; width: 16px; height: 16px; flex-shrink: 0; accent-color: #2d9b4e; cursor: pointer; }
  .family-name { font-size: 0.88rem; font-weight: 600; color: #111; font-family: "SF Mono", "Fira Code", monospace; }
  .family-done .family-name { text-decoration: line-through; color: #888; }
  .triggers { font-size: 0.78rem; color: #777; margin-top: 2px; line-height: 1.5; }
  .reset-btn { border: none; background: none; font-size: 0.78rem; color: #e05; cursor: pointer; text-decoration: underline; margin-bottom: 20px; display: block; }
  .family-row.done .family-name { text-decoration: line-through; color: #aaa; }
  .family-row.done .triggers { text-decoration: line-through; color: #bbb; }
  @media (min-width: 640px) { body { padding: 40px 32px; max-width: 820px; margin: 0 auto; } }
</style>
</head>
<body>

<h1>Dish Families – Stock Photo Tracker</h1>
<p class="subtitle">Check off each family once its stock photo has been created.</p>

<button class="reset-btn" id="resetBtn">Reset all</button>

<p class="progress-label" id="progressLabel">0 / 63 done</p>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>

<div id="content"></div>

<script>

const sections = [

      { id: "muffins", triggers: "muffin, scone" },
      { id: "cookies", triggers: "cookie, sandwich cookie, biscotti, macaron, thumbprint cookie, linzer cookie" },
      { id: "cake_slice", triggers: "layer cake, pound cake, bundt cake, sponge cake, cheesecake, swiss roll" },
      { id: "cupcakes", triggers: "cupcake" },

      { id: "fried_dough_sweets", triggers: "donut, churro, beignet, funnel cake, zeppole" },
      { id: "sweet_breads_buns", triggers: "cinnamon roll, sticky bun, babka, panettone, stollen" },
      { id: "bread_loaf_sweet", triggers: "banana bread, pumpkin bread, zucchini bread, cornbread" },
      { id: "pie_slice", triggers: "fruit pie, pumpkin pie, pecan pie, cream pie" },
      { id: "tarts", triggers: "fruit tart, lemon tart, custard tart, tartlet" },
      { id: "frozen_desserts", triggers: "ice cream, popsicle, sorbet, frozen yogurt, kulfi, mochi ice cream" },
      { id: "custards_puddings", triggers: "pudding, mousse, panna cotta, crème brûlée, flan, rice pudding, bread pudding" },
      { id: "candy_confections", triggers: "fudge, brittle, truffle, marshmallow, bark, candy bar, caramel apple" },
      { id: "layered_plated_desserts", triggers: "tiramisu, trifle, parfait, pavlova, crumble, cobbler, affogato" },
    ]
  },
  {
    title: "Bread, Pizza & Flatbread",
    families: [
      { id: "pizza", triggers: "pizza, calzone, stromboli" },
      { id: "flatbreads", triggers: "flatbread, focaccia, naan, pita, lavash, manakish, lahmacun" },
      { id: "artisan_bread", triggers: "sourdough loaf, sandwich loaf, baguette, ciabatta, brioche, challah" },
      { id: "bread_rolls", triggers: "dinner roll, bread roll, pull-apart bread" },
      { id: "bagels_pretzels", triggers: "bagel, pretzel, english muffin" },
    ]
  },
  {
    title: "Pasta, Noodles, Rice & Grains",
    families: [
      { id: "noodle_soup", triggers: "ramen, pho, laksa, udon soup, soba soup, chicken noodle soup" },
      { id: "long_pasta", triggers: "spaghetti, linguine, fettuccine, pappardelle, tagliatelle, bucatini" },
      { id: "short_pasta", triggers: "penne, rigatoni, fusilli, farfalle, macaroni, orecchiette, paccheri" },
      { id: "stuffed_pasta", triggers: "ravioli, tortellini, cannelloni, lasagna" },
      { id: "mac_cheese_bakes", triggers: "mac and cheese, baked ziti, pasta bake" },
      { id: "stir_fried_noodles", triggers: "pad thai, chow mein, lo mein, yakisoba, japchae" },
      { id: "rice_dishes", triggers: "risotto, paella, biryani, fried rice, pilaf, jollof rice, nasi goreng" },
      { id: "grain_bowls_sides", triggers: "quinoa, couscous, farro, barley, bulgur, polenta" },
    ]
  },

    families: [
      { id: "tamales", triggers: "tamale" },
      { id: "tacos", triggers: "taco, tostada, birria taco" },
      { id: "burritos_quesadillas", triggers: "burrito, quesadilla, chimichanga" },
      { id: "enchiladas_fajitas_nachos", triggers: "enchilada, fajita, nachos" },
      { id: "burgers", triggers: "burger, slider, patty melt" },
      { id: "sandwiches", triggers: "sandwich, grilled cheese, panini, sub, banh mi, torta, cubano, po' boy" },
      { id: "wraps_gyros", triggers: "wrap, shawarma, gyro, falafel wrap, lettuce wrap" },
      { id: "spring_rolls", triggers: "spring roll, egg roll, summer roll, lumpia" },
      { id: "dumplings", triggers: "dumpling, gyoza, pierogi, potsticker, wonton, shumai, bao" },
      { id: "savory_hand_pies", triggers: "samosa, empanada, pasty, sausage roll, börek, spanakopita, knish, piroshki" },
    ]
  },
  {
    title: "Soups, Stews & Curries",
    families: [
      { id: "chili", triggers: "chili" },
      { id: "soups", triggers: "soup, chowder, bisque, gazpacho, minestrone, lentil soup" },
      { id: "stews_braises", triggers: "stew, gumbo, bouillabaisse, tagine, feijoada, hot pot" },
      { id: "curries", triggers: "curry, tikka masala, butter chicken, korma, thai curry, dal, chana masala, rendang" },
    ]
  },
  {

    families: [

      { id: "dips_spreads", triggers: "hummus, guacamole, tzatziki, baba ghanoush, salsa, pesto, whipped feta, bean dip" },
      { id: "sauces_condiments", triggers: "sauce, gravy, dressing, vinaigrette, chimichurri, béchamel, hollandaise, caramel sauce, hot sauce, tomato sauce" },

      { id: "pancakes_waffles_crepes", triggers: "pancake, waffle, crepe, dutch baby, blini" },

      { id: "porridge_cereal", triggers: "oatmeal, porridge, overnight oats, muesli, congee" },

    ]

  {

    families: [

      { id: "fried_sides_snacks", triggers: "onion rings, hush puppies, corn dog" },

      { id: "steamed_dishes", triggers: "steamed buns, steamed fish, idli, dhokla, chawanmushi" },
      { id: "fritters_patties", triggers: "fritter, latke, pakora, bhaji, corn fritter, zucchini fritter" },
    ]
  },
  {
    title: "Meat, Seafood & Plant Proteins",
    families: [
      { id: "meatballs_meatloaf", triggers: "meatballs, meatloaf, kofta" },
      { id: "sushi", triggers: "sushi roll, nigiri, sashimi, hand roll, onigiri" },
      { id: "raw_cured_seafood", triggers: "ceviche, tartare, carpaccio, crudo, poke bowl, gravlax, lox" },
      { id: "seafood_mains", triggers: "fish fillet, scallops, mussels, clams, lobster, crab, shrimp dish" },
      { id: "chicken_poultry_mains", triggers: "roast chicken, chicken breast, chicken thigh, duck breast, roast turkey, cornish hen" },
      { id: "sausage_dishes", triggers: "sausage, bratwurst, chorizo, kielbasa, sausage and peppers, bangers and mash" },
      { id: "tofu_tempeh", triggers: "tofu, crispy tofu, silken tofu, tempeh, mapo tofu" },
      { id: "beans_legumes", triggers: "baked beans, refried beans, chickpea dish, lentil dish, falafel, edamame" },
    ]
  },
  {
    title: "Sides, Bowls, Drinks & Preserves",
    families: [
      { id: "potato_sides", triggers: "mashed potatoes, baked potato, wedges, potato gratin, patatas bravas" },
      { id: "vegetable_sides", triggers: "green beans, roasted carrots, asparagus, sautéed spinach, creamed corn, ratatouille, caponata" },
      { id: "skillet_one_pan", triggers: "skillet meal, one-pan meal" },
      { id: "bowls", triggers: "grain bowl, rice bowl, noodle bowl, burrito bowl, poke bowl, smoothie bowl, acai bowl" },
      { id: "beverages", triggers: "smoothie, milkshake, lemonade, cocktail, mocktail, iced tea, latte, hot chocolate, chai" },
      { id: "preserves_spreads", triggers: "jam, marmalade, chutney, compote, lemon curd" },
      { id: "pickled_fermented", triggers: "pickles, kimchi, sauerkraut, escabeche" },
      { id: "appetizers_snacks", triggers: "bruschetta, crostini, canapés, antipasto, tapas, mezze" },
      { id: "boards_platters", triggers: "charcuterie board, cheese board, mezze platter, crudités platter" },
      { id: "souffle_fondue", triggers: "soufflé, fondue" },
    ]
  },
];

const TOTAL = sections.reduce((s, sec) => s + sec.families.length, 0);
let state = {};

function load() {
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch { state = {}; }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function updateProgress() {
  const done = Object.values(state).filter(Boolean).length;
  document.getElementById("progressLabel").textContent = `${done} / ${TOTAL} done`;
  document.getElementById("progressBar").style.width = `${(done / TOTAL) * 100}%`;
}

function render() {
  const container = document.getElementById("content");
  container.innerHTML = "";
  sections.forEach(sec => {
    const secEl = document.createElement("div");
    secEl.className = "section";
    secEl.innerHTML = `<div class="section-title">${sec.title}</div>`;
    sec.families.forEach(f => {
      const row = document.createElement("label");
      row.className = "family-row" + (state[f.id] ? " done" : "");
      row.innerHTML = `
        <input type="checkbox" ${state[f.id] ? "checked" : ""} data-id="${f.id}">
        <div>
          <div class="family-name">${f.id}</div>
          <div class="triggers">${f.triggers}</div>
        </div>
      `;
      row.querySelector("input").addEventListener("change", e => {
        state[f.id] = e.target.checked;
        row.className = "family-row" + (state[f.id] ? " done" : "");
        save();
        updateProgress();
      });
      secEl.appendChild(row);
    });
    container.appendChild(secEl);
  });
}

document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Reset all checkboxes?")) {
    state = {};
    save();
    document.querySelectorAll(".family-row").forEach(r => {
      r.classList.remove("done");
      r.querySelector("input").checked = false;
    });
    updateProgress();
  }
});

load();
render();
updateProgress();
</script>
</body>
</html>
