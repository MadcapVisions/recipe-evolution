<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Dish Families – Stock Photo Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 32px 16px; }
  h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 28px; }
  .progress-bar-wrap { background: #e0e0d8; border-radius: 99px; height: 8px; margin-bottom: 28px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #2d9b4e; border-radius: 99px; transition: width 0.3s ease; }
  .progress-label { font-size: 0.8rem; color: #666; margin-bottom: 8px; }
  .section { margin-bottom: 28px; }
  .section-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #888; padding: 0 0 10px 0; border-bottom: 1px solid #ddd; margin-bottom: 10px; }
  .family-row { display: flex; align-items: flex-start; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; transition: background 0.12s; }
  .family-row:hover { background: #ebebea; }
  .family-row.done { opacity: 0.55; }
  input[type="checkbox"] { margin-top: 2px; width: 16px; height: 16px; flex-shrink: 0; accent-color: #2d9b4e; cursor: pointer; }
  .family-name { font-size: 0.88rem; font-weight: 600; color: #111; font-family: "SF Mono", "Fira Code", monospace; }
  .family-done .family-name { text-decoration: line-through; color: #888; }
  .triggers { font-size: 0.78rem; color: #777; margin-top: 2px; line-height: 1.5; }
  .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .filter-btn { border: 1px solid #ccc; background: white; border-radius: 99px; padding: 4px 12px; font-size: 0.78rem; cursor: pointer; transition: all 0.12s; }
  .filter-btn:hover, .filter-btn.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
  .reset-btn { margin-left: auto; border: none; background: none; font-size: 0.78rem; color: #e05; cursor: pointer; text-decoration: underline; }
  @media (min-width: 640px) { body { padding: 40px 32px; max-width: 820px; margin: 0 auto; } }
</style>
</head>

  <button class="filter-btn" data-filter="todo">Todo</button>
  <button class="filter-btn" data-filter="done">Done</button>
  <button class="reset-btn" id="resetBtn">Reset all</button>
</div>

<p class="progress-label" id="progressLabel">0 / 63 done</p>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>

<div id="content"></div>

const TOTAL = sections.reduce((s, sec) => s + sec.families.length, 0);
let state = {};
let filter = "all";

function load() {
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch { state = {}; }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function updateProgress() {
  const done = Object.values(state).filter(Boolean).length;
  document.getElementById("progressLabel").textContent = `${done} / ${TOTAL} done`;
  document.getElementById("progressBar").style.width = `${(done / TOTAL) * 100}%`;
}

function render() {
  const container = document.getElementById("content");
  container.innerHTML = "";
  sections.forEach(sec => {
    const visible = sec.families.filter(f => {
      if (filter === "done") return state[f.id];
      if (filter === "todo") return !state[f.id];
      return true;
    });
    if (visible.length === 0) return;

    const secEl = document.createElement("div");
    secEl.className = "section";
    secEl.innerHTML = `<div class="section-title">${sec.title}</div>`;

    visible.forEach(f => {
      const row = document.createElement("label");
      row.className = "family-row" + (state[f.id] ? " done" : "");
      row.innerHTML = `
        <input type="checkbox" ${state[f.id] ? "checked" : ""} data-id="${f.id}">
        <div>
          <div class="family-name">${f.id}</div>
          <div class="triggers">${f.triggers}</div>
        </div>
      `;
      row.querySelector("input").addEventListener("change", e => {
        state[f.id] = e.target.checked;
        save();
        render();
        updateProgress();
      });
      secEl.appendChild(row);
    });
    container.appendChild(secEl);
  });
}

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    filter = btn.dataset.filter;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
});

document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Reset all checkboxes?")) {
    state = {};
    save();
    render();
    updateProgress();
  }
});

load();
render();
updateProgress();
</script>
